name: CI

on:
  push:
    branches:
      - main
      - development
      - 'psi/**'
      - 'Grerrow/**'
  pull_request:
    branches:
      - main
      - development

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # pre-built GitHub Action that "git clone" the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # run this in terminal: "cargo build --workspace" (builds all the Rust packages in the workspace)
      - name: Build workspace
        run: cargo build --workspace

      # run this in terminal: "cargo test --workspace" (runs all the tests in the workspace)
      - name: Run tests
        run: cargo test --workspace