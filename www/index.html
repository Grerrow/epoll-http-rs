<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            color: #222;
            padding: 2rem;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        .actions { display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; }
        button {
            padding: 0.5rem 1.2rem;
            background: #222;
            color: #fff;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
        }
        button:hover { background: #444; }
        #status {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #555;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Homepage</h1>
    <div class="actions">
        <button onclick="document.getElementById('fileInput').click()">Upload File</button>
        <input type="file" id="fileInput" style="display: none;">
        <button onclick="window.location.href='/uploads_entries'">View Uploads</button>
    </div>
    <p id="status"></p>
    <script>
        document.getElementById('fileInput').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                console.log('Selected file:', file.name);
                async function uploadFile() {
                    const formData = new FormData();
                    formData.append('file', file);
                    try {
                        const response = await fetch('/uploads', {
                            method: 'POST',
                            body: formData
                        });
                        if (response.ok) {
                            document.getElementById('status').textContent = 'File uploaded successfully';
                        } else {
                            document.getElementById('status').textContent = 'File upload failed';
                        }
                    } catch (error) {
                        document.getElementById('status').textContent = 'Error: ' + error.message;
                    }
                }
                uploadFile();
            }
        });
    </script>
</div>
</body>
