<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uploads</title>
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f5f5f5;
        color: #222;
        padding: 2rem;
    }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
    h2 { font-size: 1rem; color: #555; margin: 1.5rem 0 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
    #status {
        margin-bottom: 1.25rem;
        padding: 0.6rem 0.9rem;
        border-left: 3px solid #222;
        background: #ebebeb;
        font-size: 0.9rem;
        color: #444;
    }
    ul { list-style: none; }
    li {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.5rem 0;
        border-bottom: 1px solid #ddd;
        font-size: 0.95rem;
    }
    li span { flex: 1; }
    button {
        padding: 0.3rem 0.8rem;
        background: #b00;
        color: #fff;
        border: none;
        font-size: 0.85rem;
        cursor: pointer;
    }
    button:hover { background: #d00; }
    pre {
        background: #ebebeb;
        padding: 0.75rem;
        font-size: 0.82rem;
        overflow-x: auto;
        border: 1px solid #ddd;
    }
    .home-btn {
        margin-bottom: 1rem;
        background: #222;
    }
    .home-btn:hover {
        background: #444;
    }
</style>
</head>

<body>
<div class="container">

<h1>Uploads</h1>
<button class="home-btn" onclick="window.location.href='/'">Go to Homepage</button>

<div id="status">Waiting...</div>

<h2>Raw JSON</h2>
<pre id="rawJson"></pre>

<h2>Files</h2>
<ul id="uploadsList"></ul>

</div>
<script>
console.log("SCRIPT STARTED");

function setStatus(msg) {
    document.getElementById("status").textContent = msg;
    console.log(msg);
}

async function fetchUploads() {
    try {
        setStatus("Fetching uploads...");

        const response = await fetch("/uploads/list");

        console.log("Response object:", response);
        console.log("Status:", response.status);

        setStatus("Response status: " + response.status);

        if (!response.ok) {
            throw new Error("HTTP " + response.status);
        }

        const text = await response.text();

        console.log("Raw response text:");
        console.log(text);

        document.getElementById("rawJson").textContent = text;

        const uploads = JSON.parse(text);

        console.log("Parsed uploads:", uploads);
        console.log("Type:", typeof uploads);
        console.log("Array:", Array.isArray(uploads));
        console.log("Length:", uploads.length);

        setStatus(
            "Parsed " +
            uploads.length +
            " file(s)"
        );

        const list = document.getElementById("uploadsList");
        list.innerHTML = "";

        uploads.forEach((filename, index) => {
            console.log("Rendering:", filename);

            const li = document.createElement("li");

            const span = document.createElement("span");
            span.textContent = filename;

            const btn = document.createElement("button");
            btn.textContent = "Delete";

            btn.addEventListener("click", async () => {
                console.log("DELETE CLICKED:", filename);

                try {
                    const res = await fetch(
                        `/uploads/delete/${encodeURIComponent(filename)}`,
                        {
                            method: "DELETE"
                        }
                    );

                    console.log("Delete status:", res.status);

                    if (res.ok) {
                        fetchUploads();
                    }
                } catch (err) {
                    console.error("Delete error:", err);
                }
            });

            li.appendChild(span);
            li.appendChild(btn);
            list.appendChild(li);
        });

        console.log("Rendering complete");

    } catch (err) {
        console.error("FATAL ERROR:", err);

        setStatus("ERROR: " + err);
    }
}

window.addEventListener("load", () => {
    console.log("WINDOW LOADED");
    fetchUploads();
});
</script>
</body>
</html>
